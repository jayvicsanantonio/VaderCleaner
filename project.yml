# project.yml
# xcodegen project spec for VaderCleaner macOS app

name: VaderCleaner
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    macOS: "26.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: NO
    # Sign with the Apple Development certificate so the privileged helper has a
    # stable Team identity that launchd will spawn (ad-hoc signing has no team
    # and its cdhash churns every build, which SMAppService rejects with
    # EX_CONFIG). The app's entitlements need no provisioned capabilities, so
    # manual signing with the dev cert works without a provisioning profile.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    DEVELOPMENT_TEAM: XGQ94CMBTN

targets:
  VaderCleaner:
    type: application
    platform: macOS
    sources:
      - path: VaderCleaner
        excludes:
          - "**/*.md"
      - path: Shared
      - path: VaderCleanerHelper/com.personal.VaderCleaner.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      - target: VaderCleanerHelper
        copy:
          destination: executables
    postCompileScripts:
      # Copies the bundled ClamAV binaries, dylibs, and data into the built
      # .app and code-signs them. Runs before the Embed/Copy phases and the
      # final bundle signing, as stage-clamav.sh requires. alwaysOutOfDate
      # (basedOnDependencyAnalysis: false) so it re-stages on every build.
      - name: Stage bundled ClamAV
        script: "\"${SRCROOT}/Scripts/stage-clamav.sh\"\n"
        shell: /bin/sh
        basedOnDependencyAnalysis: false
        inputFiles:
          - "$(SRCROOT)/Vendor/clamav/bin/clamscan"
          - "$(SRCROOT)/Vendor/clamav/bin/freshclam"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/clamav/bin/clamscan"
          - "$(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/clamav/bin/freshclam"
    postBuildScripts:
      # Ad-hoc signs the embedded helper and the app so SMAppService can register
      # the privileged helper on local, unsigned development builds (the
      # Optimization actions need it). Runs last — after the helper is embedded
      # and ClamAV is staged — and no-ops when a real Developer ID identity is
      # configured, so release signing is untouched. alwaysOutOfDate so it
      # re-signs on every build.
      - name: Ad-hoc sign for local development
        script: "\"${SRCROOT}/Scripts/sign-dev.sh\"\n"
        shell: /bin/sh
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.VaderCleaner
        PRODUCT_NAME: VaderCleaner
        INFOPLIST_FILE: VaderCleaner/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VaderCleaner/VaderCleaner.entitlements
        ENABLE_PREVIEWS: YES
    info:
      path: VaderCleaner/Info.plist
      properties:
        CFBundleDisplayName: VaderCleaner
        CFBundleName: VaderCleaner
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false

  VaderCleanerHelper:
    type: tool
    platform: macOS
    sources:
      - path: VaderCleanerHelper
        excludes:
          - "**/*.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: VaderCleanerHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.VaderCleaner.helper
        SKIP_INSTALL: YES
        # Embed an Info.plist in the tool's Mach-O so codesign uses its bundle id
        # (com.personal.VaderCleaner.helper) as the signing identifier. Without
        # this a command-line tool signs under its executable name
        # (VaderCleanerHelper), which fails the app's XPC code-signing
        # requirement and the connection is rejected.
        GENERATE_INFOPLIST_FILE: YES
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES

  VaderCleanerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VaderCleanerTests
    dependencies:
      - target: VaderCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.VaderCleanerTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VaderCleaner.app/Contents/MacOS/VaderCleaner"
        GENERATE_INFOPLIST_FILE: YES

  VaderCleanerUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: VaderCleanerUITests
    dependencies:
      - target: VaderCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.VaderCleanerUITests
        TEST_TARGET_NAME: VaderCleaner
        GENERATE_INFOPLIST_FILE: YES
